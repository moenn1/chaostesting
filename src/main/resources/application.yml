spring:
  application:
    name: chaos-control-plane
  datasource:
    url: jdbc:h2:file:./data/chaos-control-plane;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

agent-registry:
  stale-after: 30s

chaos:
  guardrails:
    environment-policy-mode: allowlist
    controlled-environments:
      - local
      - dev
      - staging
      - prod
      - prod-shadow
    production-like-environments:
      - prod
      - production
      - prod-shadow
    max-duration: 15m
    approval-ttl: 30m

agent:
  runtime:
    enabled: false
    control-plane-base-url: http://localhost:${server.port:8080}
    name: local-agent
    hostname: ${HOSTNAME:localhost}
    environment: local
    region: local
    supported-fault-capabilities:
      - latency
      - http_error
    heartbeat-interval: 10s
    command-poll-interval: 5s
    registration-file: ./data/agent-runtime/registration.json

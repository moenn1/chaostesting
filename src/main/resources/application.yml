spring:
  application:
    name: chaos-control-plane
  datasource:
    url: jdbc:h2:file:./data/chaos-control-plane;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

agent-registry:
  stale-after: 30s

spring:
  application:
    name: chaos-control-plane
  datasource:
    url: jdbc:h2:file:./data/chaos-control-plane;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

agent-registry:
  stale-after: 30s

chaos:
  auth:
    mode: oidc
    oidc:
      role-claim: groups
      principal-claim: preferred_username
  guardrails:
    environment-policy-mode: allowlist
    controlled-environments:
      - local
      - dev
      - staging
      - prod
      - prod-shadow
    production-like-environments:
      - prod
      - production
      - prod-shadow
    max-duration: 15m
    approval-ttl: 30m
